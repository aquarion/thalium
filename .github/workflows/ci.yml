name: CI

on:
  push:
    branches: [dependabot-updates]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and deploy"
        type: string
        required: true

concurrency:
  group: ci-${{ inputs.tag || github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ inputs.tag == '' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_NAME: thalium

permissions: {}

jobs:
  test:
    uses: istic/shared-workflows/.github/workflows/laravel-tests.yml@main
    with:
      php_version: ${{ vars.php_version }}
      node_version: ${{ vars.node_version }}
      test_command: "vendor/bin/phpunit"
    secrets: inherit # pragma: allowlist secret

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' &&
       !github.event.pull_request.draft &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }},enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }},enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha
            type=raw,value=latest,enable=${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=staging,enable=${{ github.event_name == 'pull_request' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ inputs.tag || github.ref_name }}
            APP_PR_NUMBER=${{ github.event.pull_request.number }}
            APP_BRANCH=${{ github.head_ref }}
            APP_ENV=${{ github.event_name == 'pull_request' && 'staging' || 'production' }}

  deploy-staging:
    needs: build-and-push
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1
        with:
          host: firth.water.gkhs.net
          username: ${{ env.APP_NAME }}
          key: ${{ secrets.FIRTH_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/docker/${{ env.APP_NAME }}-staging
            timeout 300 docker compose pull || {
              echo "ERROR: docker compose pull failed or timed out"
              exit 1
            }
            docker compose up -d || {
              echo "ERROR: docker compose up -d failed"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            }
            for i in $(seq 1 30); do
              if docker compose exec -T app php artisan --version > /dev/null 2>&1; then
                echo "Container ready after ${i} attempt(s)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Container failed to become ready after 30 attempts"
                echo "--- Final readiness check output ---"
                docker compose exec -T app php artisan --version || true
                docker compose logs --tail=50 app
                exit 1
              fi
              echo "Attempt ${i}/30: container not ready, waiting..."
              sleep 2
            done
            docker compose exec -T app test -d /var/www/html/public/build/assets || {
              echo "ERROR: build assets not found in container"
              exit 1
            }
            mkdir -p public/build
            docker compose cp app:/var/www/html/public/build/assets public/build/assets.new || {
              echo "ERROR: docker compose cp failed. Existing assets preserved."
              exit 1
            }
            docker compose cp app:/var/www/html/public/build/manifest.json public/build/manifest.json.new || {
              echo "ERROR: docker compose cp manifest.json failed. Existing assets preserved."
              exit 1
            }
            rm -rf public/build/assets
            mv public/build/assets.new public/build/assets
            mv public/build/manifest.json.new public/build/manifest.json
            docker compose exec -T app php artisan migrate --force || {
              echo "ERROR: Migration failed"
              docker compose exec -T app php artisan migrate:status || true
              exit 1
            }
            docker compose exec -T app php artisan db:seed --force || {
              echo "ERROR: Seeding failed"
              exit 1
            }

  deploy-production:
    needs: build-and-push
    if: inputs.tag != ''
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@v1
        with:
          host: firth.water.gkhs.net
          username: ${{ env.APP_NAME }}
          key: ${{ secrets.FIRTH_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/docker/${{ env.APP_NAME }}
            timeout 300 docker compose pull || {
              echo "ERROR: docker compose pull failed or timed out"
              exit 1
            }
            docker compose up -d || {
              echo "ERROR: docker compose up -d failed"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            }
            for i in $(seq 1 30); do
              if docker compose exec -T app php artisan --version > /dev/null 2>&1; then
                echo "Container ready after ${i} attempt(s)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Container failed to become ready after 30 attempts"
                echo "--- Final readiness check output ---"
                docker compose exec -T app php artisan --version || true
                docker compose logs --tail=50 app
                exit 1
              fi
              echo "Attempt ${i}/30: container not ready, waiting..."
              sleep 2
            done
            docker compose exec -T app test -d /var/www/html/public/build/assets || {
              echo "ERROR: build assets not found in container"
              exit 1
            }
            mkdir -p public/build
            docker compose cp app:/var/www/html/public/build/assets public/build/assets.new || {
              echo "ERROR: docker compose cp failed. Existing assets preserved."
              exit 1
            }
            docker compose cp app:/var/www/html/public/build/manifest.json public/build/manifest.json.new || {
              echo "ERROR: docker compose cp manifest.json failed. Existing assets preserved."
              exit 1
            }
            rm -rf public/build/assets
            mv public/build/assets.new public/build/assets
            mv public/build/manifest.json.new public/build/manifest.json
            docker compose exec -T app php artisan migrate --force || {
              echo "ERROR: Migration failed"
              docker compose exec -T app php artisan migrate:status || true
              exit 1
            }
